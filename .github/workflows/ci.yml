name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"

jobs:
  # ─────────────────────────────────────────────
  # Backend: lint + type-check + unit tests
  # ─────────────────────────────────────────────
  backend-ci:
    name: Backend CI (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_pass
          POSTGRES_DB: sentinel_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel -d sentinel_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SENTINEL_DB_HOST: localhost
      SENTINEL_DB_PORT: 5432
      SENTINEL_DB_USER: sentinel
      SENTINEL_DB_PASSWORD: sentinel_pass
      SENTINEL_DB_NAME: sentinel_db
      SENTINEL_COLLECTOR_SECRET: ci-test-secret-not-for-production
      SENTINEL_ENV: development
      SENTINEL_FIREBASE_AUTH_ENABLED: "false"
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Lint — ruff (if present) or flake8 fallback
        run: |
          if pip show ruff &>/dev/null; then
            ruff check src/ tests/
          else
            pip install flake8 --quiet
            flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503
          fi

      - name: Type-check — pyright
        run: |
          pip install pyright --quiet
          pyright src/ || true   # non-blocking until strict typing is enforced

      - name: Run pytest (unit + integration, skips e2e that need real Kafka)
        run: |
          pytest tests/ \
            -ra \
            --timeout=60 \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_live_errors.py \
            -v

  # ─────────────────────────────────────────────
  # Frontend: type-check + lint + build
  # ─────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (Node 24)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Vite production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Docker: build smoke test (no push)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (cache only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: sentinelcore-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
